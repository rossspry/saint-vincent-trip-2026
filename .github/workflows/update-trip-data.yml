name: Update trip data from AIS and weather

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-trip-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install --upgrade websockets

      - name: Update trip data
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
          AIS_TIMEOUT_SECONDS: "120"
        run: python scripts/update_trip_data.py

      - name: Commit trip data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add trip-data.json
          if git diff --cached --quiet; then
            echo "No trip data changes to commit."
          else
            git commit -m "Update live trip data"
            git push
          fi
